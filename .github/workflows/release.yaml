name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true
      - run: go vet ./...
      - run: go test -race ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - { goos: linux,   goarch: amd64, asset: gh-relay_linux_amd64,   archive: tar.gz }
          - { goos: linux,   goarch: arm64, asset: gh-relay_linux_arm64,   archive: tar.gz }
          - { goos: darwin,  goarch: amd64, asset: gh-relay_darwin_amd64,  archive: tar.gz }
          - { goos: darwin,  goarch: arm64, asset: gh-relay_darwin_arm64,  archive: tar.gz }
          - { goos: windows, goarch: amd64, asset: gh-relay_windows_amd64, archive: zip    }
          - { goos: windows, goarch: arm64, asset: gh-relay_windows_arm64, archive: zip    }

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true

      - name: Set binary name
        id: bin
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            echo "name=gh-relay.exe" >> "$GITHUB_OUTPUT"
          else
            echo "name=gh-relay" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags="-s -w -X github.com/soub4i/gh-relay/internal/version.Version=${{ github.ref_name }}" \
            -o ${{ steps.bin.outputs.name }} \
            .

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: tar czf ${{ matrix.asset }}.tar.gz ${{ steps.bin.outputs.name }} README.md LICENSE

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: zip ${{ matrix.asset }}.zip ${{ steps.bin.outputs.name }} README.md LICENSE

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}.${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Changelog
        id: cl
        run: |
          PREV=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          if [ -z "$PREV" ]; then
            LOG=$(git log --oneline --no-merges)
          else
            LOG=$(git log "${PREV}..HEAD" --oneline --no-merges)
          fi
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG"     >> "$GITHUB_OUTPUT"
          echo "EOF"      >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.tar.gz
            dist/*.zip
          fail_on_unmatched_files: true
          body: |
            ## What's changed

            ${{ steps.cl.outputs.log }}

            ---

            ## Install

            ```bash
            # macOS Apple Silicon
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/gh-relay_darwin_arm64.tar.gz | tar xz
            sudo mv gh-relay /usr/local/bin/

            # macOS Intel
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/gh-relay_darwin_amd64.tar.gz | tar xz
            sudo mv gh-relay /usr/local/bin/

            # Linux amd64
            curl -L https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/gh-relay_linux_amd64.tar.gz | tar xz
            sudo mv gh-relay /usr/local/bin/
            ```

            Windows: download the `.zip` for your architecture and extract `gh-relay.exe`.